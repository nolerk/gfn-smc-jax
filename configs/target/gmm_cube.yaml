name: gmm_cube
num_components: 10
dim: 2

fn:
  _target_: targets.gmm_cube.GMMCube
  num_components: ${target.num_components}
  dim: ${target.dim}
  min_coord: 0.0
  max_coord: 1.0
  mask_outside: True
  scale: 0.001

# Experiment-specific algorithm parameters
# !!! Default Parameters; Currently not tuned for this experiment !!!
# ----------------------------------------

pcula:
  max_diffusion: 1.
  init_std: 1.
  step_size: 5e-4
  penalty_strength: 1.0

gfn_tb: # Trajectory Balance
  reference_process: ou_dds  # pinned_brownian, ou, or ou_dds
  init_std: 1.  # for ou or ou_dss
  max_diffusion: 1.  # for pinned_brownian or ou
  step_size: 1e-3
  logZ_step_size: 1e-1
  init_logZ: 0.

gfn_tb_beta: # Trajectory Balance
  step_size: 1e-3
  logZ_step_size: 1e-1
  init_logZ: 0.

all: # Parameters that are shared between all algorithms
  batch_size: 2000
  iters: 20000
  milestones: [10000, 15000]
  num_steps: 64
  use_lp: True
  num_hid: 256